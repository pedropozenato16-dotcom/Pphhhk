name: Bedrock AFK Bot 24/7

on:
  schedule:
    - cron: '0 */2 * * *' # ⏱️ حيلة ذكية: يعيد تشغيل الجوب تلقائياً كل ساعتين
  workflow_dispatch:      # 🔘 يسمح لك بتشغيل البوت يدوياً بضغطة زر في أي وقت
  push:
    branches: [ main, master ] # 🚀 يشتغل فوراً إذا قمت بتعديل الكود وعملت Commit

# 🔥 سر الطبخة: يقوم بإلغاء البوت القديم وتشغيل الجديد فوراً لمنع الـ Timeout
concurrency:
  group: bedrock-afk-bot
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: 📁 سحب الكود من المستودع
        uses: actions/checkout@v4

      - name: 🟢 تهيئة بيئة Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 تثبيت مكتبة بروتوكول البدروك
        run: |
          if [ ! -f package.json ]; then npm init -y; fi
          npm install bedrock-protocol

      - name: 🤖 تشغيل بوت الأفروة المضاد للطرد
        timeout-minutes: 340 # حد أمان لمنع تجاوز الـ 6 ساعات الصارمة لغيت هاب
        run: node bot.js
