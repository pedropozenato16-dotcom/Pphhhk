name: Minecraft Bot 24/7

on:
  push:
    branches: [ main ]
  workflow_dispatch: # الاعتماد الكلي على التشغيل الذاتي واليدوي

permissions:
  actions: write
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Dependencies
      run: npm install

    - name: Kill and Purge All Previous Runs
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "جاري فحص وتصفية المستودع من أي مهمة قديمة تعمل حالياً..."
        # جلب جميع المعرفات للمهام التي في حالة العمل (in_progress) أو الانتظار (queued)
        all_runs=$(gh run list --workflow=main.yml --json databaseId,status -q '.[] | select(.status=="in_progress" or .status=="queued") | .databaseId')
        
        for run_id in $all_runs; do
          if [ "$run_id" != "$GITHUB_RUN_ID" ]; then
            echo "🚨 تم كشف مهمة زائدة! جاري إغلاق المهمة رقم: $run_id"
            gh run cancel $run_id || true
            sleep 2 # وقت قصير للتأكد من إتمام الإلغاء بالسيرفر
          fi
        done

    - name: Start Minecraft Bot
      # قفل التشغيل لـ 230 دقيقة (أقل من 4 ساعات)
      timeout-minutes: 230
      run: npm start
      continue-on-error: true

    - name: Trigger Next Loop (Chain Workflow)
      if: always()
      run: |
        echo "إرسال إشارة لتشغيل مهمة جديدة ونظيفة..."
        curl -X POST \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/main.yml/dispatches \
          -d '{"ref":"main"}'
          
